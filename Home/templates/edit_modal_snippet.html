<!-- Edit Milk Modal -->
<div class="modal fade" id="editMilkModal" tabindex="-1" aria-labelledby="editMilkModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editMilkModalLabel">Edit Milk Record</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editMilkForm" method="POST" action="">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="modal_litres" class="form-label">Litres Collected</label>
                        <input type="number" step="0.01" class="form-label form-control" id="modal_litres" name="litres" required>
                    </div>
                    <div class="mb-3">
                        <label for="modal_price" class="form-label">Buying Price (per Litre)</label>
                        <input type="number" step="0.01" class="form-control" id="modal_price" name="price" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Script to handle passing data into the modal when an edit button is clicked
    document.addEventListener('DOMContentLoaded', function() {
        const editButtons = document.querySelectorAll('.edit-milk-btn');
        const editForm = document.getElementById('editMilkForm');
        const litresInput = document.getElementById('modal_litres');
        const priceInput = document.getElementById('modal_price');

        editButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Get data from button attributes
                const url = this.getAttribute('data-url');
                const litres = this.getAttribute('data-litres');
                const price = this.getAttribute('data-price');

                // Set form action and input values
                editForm.action = url;
                litresInput.value = litres;
                priceInput.value = price;
            });
        });
    });
</script>
