{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5 shadow-lg border-0" style="border-radius: 20px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);">
                <h3 class="fw-bold mb-2 text-dark">{{ title }}</h3>
                <p class="text-muted mb-4 small">Update the record details for <strong>{{ farmer.name }}</strong></p>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        {{ form.as_p }}
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                            <i class="fas fa-save me-2"></i> Save Changes
                        </button>
                        <a href="{% url 'manage_farmer_full' farmer.pk %}" class="btn btn-light btn-sm rounded-pill mt-2">
                            Cancel & Go Back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling to match your glass-input class if not in CSS file */
    input, select {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        border-radius: 0.25rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        margin-bottom: 10px;
    }
</style>
{% endblock %}
