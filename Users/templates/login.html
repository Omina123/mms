{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DairyFlow | Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://images.unsplash.com/photo-1546445317-29f4545e9d53?q=80&w=1200&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; padding: 15px;
        }

        /* The Small Card Constraint */
        .glass-container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            width: 100%;
            max-width: 360px; /* Force it small */
            padding: 30px;
            color: #fff;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .brand-icon {
            width: 50px; height: 50px; background: #fff; color: #0061ff;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 1.5rem;
        }

        h5 { font-weight: 800; font-size: 1.25rem; margin-bottom: 25px; text-align: center; }

        .form-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; opacity: 0.8; margin-bottom: 5px; }

        .input-group { 
            background: rgba(255, 255, 255, 0.08); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 12px; margin-bottom: 15px;
        }

        .form-control { 
            background: transparent !important; border: none; color: #fff !important; 
            padding: 10px; font-size: 0.9rem; 
        }
        
        .form-control:focus { box-shadow: none; }
        .input-group-text { background: transparent; border: none; color: rgba(255, 255, 255, 0.5); }

        .btn-submit {
            background: #fff; color: #000; border: none; padding: 12px;
            border-radius: 12px; font-weight: 800; width: 100%;
            text-transform: uppercase; font-size: 0.85rem; margin-top: 10px;
            transition: 0.2s;
        }

        .btn-submit:hover { background: #00f2ff; transform: scale(1.02); }

        .footer-link { color: #00f2ff; text-decoration: none; font-size: 0.8rem; font-weight: 600; }
        
        /* Utility */
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="brand-icon"><i class="fas fa-lock"></i></div>
    <h5>DairyFlow Login</h5>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger py-2 px-3 small border-0 bg-danger text-white mb-3" style="border-radius: 10px; --bs-bg-opacity: .4;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" id="authForm">
        {% csrf_token %}
        
        <label class="form-label">Phone or Email</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" name="username" class="form-control" placeholder="254..." required>
        </div>

        <label class="form-label">Password</label>
        <div class="input-group">
            <span class="input-group-text"><i class="fas fa-key"></i></span>
            <input type="password" name="password" id="pass" class="form-control" placeholder="••••••••" required>
            <span class="input-group-text cursor-pointer" onclick="togglePass()">
                <i class="fas fa-eye" id="eye"></i>
            </span>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check p-0 m-0 d-flex align-items-center">
                <input type="checkbox" id="rem" style="accent-color: #00f2ff; width: 14px; height: 14px;">
                <label class="small opacity-75 ms-2" for="rem" style="font-size: 0.7rem;">Stay In</label>
            </div>
            <a href="#" class="footer-link">Forgot?</a>
        </div>

        <button type="submit" class="btn-submit" id="btn">Sign In</button>

        <div class="text-center mt-4">
            <span class="small opacity-50">New Member?</span> 
            <a href="{% url 'register' %}" class="footer-link ms-1">Create Account</a>
        </div>
    </form>
</div>

<script>
    function togglePass() {
        const p = document.getElementById('pass');
        const i = document.getElementById('eye');
        p.type = p.type === 'password' ? 'text' : 'password';
        i.classList.toggle('fa-eye');
        i.classList.toggle('fa-eye-slash');
    }

    document.getElementById('authForm').addEventListener('submit', function() {
        const b = document.getElementById('btn');
        b.disabled = true;
        b.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
    });
</script>

</body>
</html>
