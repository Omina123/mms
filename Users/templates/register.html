{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | DairyFlow Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: url('https://images.unsplash.com/photo-1546445317-29f4545e9d53?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 580px;
            padding: 45px;
            color: #fff;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .brand-icon {
            background: #fff;
            color: #0061ff;
            width: 70px;
            height: 70px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2.2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-label {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .input-group:focus-within {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding-left: 18px;
        }

        .form-control {
            background: transparent;
            border: none;
            color: #fff;
            padding: 14px 15px;
            font-weight: 500;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
        .form-control:focus { background: transparent; color: #fff; box-shadow: none; }

        .btn-register {
            background: #fff;
            color: #001a4d;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            width: 100%;
            margin-top: 30px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: #00f2ff;
            color: #000;
            transform: translateY(-3px);
        }

        .match-indicator {
            font-size: 0.7rem;
            margin-top: 5px;
            font-weight: 600;
            opacity: 0;
        }

        .strength-dots {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        .dot {
            height: 4px;
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .login-link {
            color: #00f2ff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="glass-card">

    <div class="text-center mb-4">
        <div class="brand-icon">
            <i class="fas fa-cow"></i>
        </div>
        <h2 class="fw-bolder mb-1">Create Authority</h2>
        <p class="small opacity-75">Secure Access for DairyFlow Members</p>
    </div>

    <form method="POST" id="mainForm">
        {% csrf_token %}

        <!-- FIRST + LAST NAME -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                    <input type="text" name="first_name" class="form-control" placeholder="John" required>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                    <input type="text" name="last_name" class="form-control" placeholder="Doe" required>
                </div>
            </div>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
            </div>
        </div>

        <!-- PHONE -->
        <div class="mb-3">
            <label class="form-label">Phone (M-Pesa Verified)</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-phone-alt"></i></span>
                <input type="text" name="phone_number" class="form-control" placeholder="2547XXXXXXXX" required>
            </div>
        </div>

        <!-- ID NUMBER -->
        <div class="mb-3">
            <label class="form-label">ID Number</label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                <input type="text" name="id_number" class="form-control" placeholder="12345678">
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input type="password" name="password1" class="form-control" required>
                </div>
                <div class="strength-dots">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-shield-check"></i></span>
                    <input type="password" name="password2" class="form-control" required>
                </div>
                <div class="match-indicator" id="matchText">Checking...</div>
            </div>
        </div>

        <button type="submit" class="btn-register">
            Securely Register <i class="fas fa-fingerprint ms-2"></i>
        </button>

        <div class="text-center mt-4">
            <span class="small opacity-50">Already registered?</span>
            <a href="{% url 'Login' %}" class="login-link ms-2">Login Terminal</a>
        </div>

    </form>

</div>

</body>
</html>
