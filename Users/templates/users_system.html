{% extends 'baseAdmin.html' %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white">
            <h5 class="text-primary mb-0">User Permissions (Inline Editor)</h5>
        </div>
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>User</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>
                            <strong>{{ user.get_full_name|default:user.username }}</strong><br>
                            <small class="text-muted">{{ user.email }}</small>
                        </td>
                        <td>
                            <form action="{% url 'edit_user_role' user.id %}" method="POST" class="d-flex gap-2">
                                {% csrf_token %}
                                <select name="user_type" class="form-select form-select-sm" style="width: 150px;">
                                    <option value="1" {% if user.user_type == '1' %}selected{% endif %}>Admin</option>
                                    <option value="3" {% if user.user_type == '3' %}selected{% endif %}>Manager</option>
                                    <option value="4" {% if user.user_type == '4' %}selected{% endif %}>Farmer</option>
                                </select>
                        </td>
                        <td>
                                <button type="submit" class="btn btn-success btn-sm px-3">
                                    <i class="fas fa-save"></i> Save
                                </button>
                            </form>
                            </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
